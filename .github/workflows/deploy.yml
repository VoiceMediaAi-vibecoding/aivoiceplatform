name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy to production
    runs-on: self-hosted
    timeout-minutes: 10
    env:
      PROD_DIR: /home/ubuntu/LiveKit
      SRC_DIR: ${{ github.workspace }}
      # Files/dirs to NEVER rsync into the production root — they live there
      # already and overwriting them would either leak secrets (.env) or break
      # the install (re-creating .venv on every deploy is slow + risky for
      # docker layer cache).
      RSYNC_EXCLUDES: >-
        --exclude=.env
        --exclude=.env.example
        --exclude=.venv
        --exclude=node_modules
        --exclude=.git
        --exclude=.next
        --exclude=__pycache__
        --exclude=.venv.bak
        --exclude=deploy.log

    steps:
      - name: Check out the pushed commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 5   # need HEAD~1 for change detection

      - name: Sync code from runner checkout to PROD_DIR
        run: |
          echo "Syncing $SRC_DIR → $PROD_DIR"
          rsync -a --delete $RSYNC_EXCLUDES "$SRC_DIR/" "$PROD_DIR/"
          echo "--- $PROD_DIR contents (top 10) ---"
          ls -la "$PROD_DIR" | head -10
          echo "--- last 5 commits ---"
          cd "$PROD_DIR" && git log --oneline -5 2>/dev/null || \
            (cd "$SRC_DIR" && git log --oneline -5)

      - name: Detect changed services
        id: detect
        run: |
          # Use git in SRC_DIR (the runner's checkout — IS a git repo).
          cd "$SRC_DIR"
          CHANGED=$(git diff --name-only HEAD~1 HEAD | awk -F/ '{print $2}' | sort -u)
          SERVICES=""
          for path in $CHANGED; do
            case "$path" in
              api)      SERVICES="$SERVICES api" ;;
              agent)    SERVICES="$SERVICES agent" ;;
              dashboard) SERVICES="$SERVICES dashboard" ;;
            esac
          done
          if echo "$CHANGED" | grep -q "^monitoring"; then
            SERVICES="$SERVICES prometheus grafana"
          fi
          # Default to rebuilding api (most common change) so first deploys
          # don't accidentally no-op.
          [ -z "$SERVICES" ] && SERVICES="api"
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "Files changed: $CHANGED"
          echo "Will rebuild:  $SERVICES"

      - name: Build changed services
        working-directory: ${{ env.PROD_DIR }}
        run: |
          for svc in ${{ steps.detect.outputs.services }}; do
            echo "Building $svc..."
            docker compose build "$svc"
          done

      - name: Apply — docker compose up -d
        working-directory: ${{ env.PROD_DIR }}
        run: docker compose up -d ${{ steps.detect.outputs.services }}

      - name: Wait for api to be Docker-healthy (not just HTTP-responding)
        run: |
          # The Docker healthcheck polls every 10s with start_period=25s.
          # Wait up to 90s for it to flip from "starting" to "healthy".
          # Just hitting /health/ready isn't enough — the smoke checks
          # `docker compose ps` output which only shows `(healthy)` after
          # the Docker-internal healthcheck has passed at least once.
          for i in $(seq 1 45); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' livekit-api-1 2>/dev/null || echo "none")
            if [ "$STATUS" = "healthy" ]; then
              echo "✅ Docker reports api as healthy after $((i*2))s"
              # Also confirm the HTTP endpoint actually responds
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 2 http://127.0.0.1:8000/health/ready || echo "000")
              echo "HTTP /health/ready = $HTTP"
              exit 0
            fi
            sleep 2
          done
          echo "❌ TIMEOUT: livekit-api-1 never became Docker-healthy after 90s"
          docker inspect --format='{{json .State.Health}}' livekit-api-1 2>&1 | head -20
          exit 1

      - name: Smoke E2E
        working-directory: ${{ env.PROD_DIR }}
        run: python3 scripts/smoke_e2e.py

      - name: ✅ Deploy succeeded
        if: success()
        run: |
          SHORT=$(cd "$SRC_DIR" && git rev-parse --short HEAD)
          MSG=$(cd "$SRC_DIR" && git log -1 --pretty=%s)
          echo "✅ Deployed $SHORT: $MSG"

      - name: ❌ Deploy failed
        if: failure()
        run: |
          SHORT=$(cd "$SRC_DIR" && git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          echo "❌ Deploy $SHORT FAILED"
          echo "Check:"
          echo "  docker compose -f $PROD_DIR/docker-compose.yml ps"
          echo "  tail -50 $PROD_DIR/deploy.log"
          echo "  cat /home/ubuntu/actions-runner/_diag/Runner_*.log | tail -100"

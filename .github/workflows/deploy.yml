name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy to production
    runs-on: self-hosted
    timeout-minutes: 10
    env:
      PROD_DIR: /home/ubuntu/LiveKit
      REPO_URL: https://github.com/VoiceMediaAi-vibecoding/aivoiceplatform.git

    steps:
      # NOTE: No `actions/checkout` step — we deploy directly from the
      # runner's checkout location (where actions/checkout would have placed
      # the code anyway), then rsync into /home/ubuntu/LiveKit which has
      # the .env, the .venv, the running containers, and the smoke script.

      - name: Pull latest into PROD_DIR
        run: |
          cd "$PROD_DIR"
          # The runner's checkout leaves the working tree in some state; align
          # with origin/main. `--hard` discards any drift in PROD_DIR (the
          # only "important" untracked file is .env, which git preserves).
          git fetch origin main
          git reset --hard origin/main
          echo "Now at: $(git rev-parse --short HEAD) — $(git log -1 --pretty=%s)"

      - name: Detect changed services
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | awk -F/ '{print $2}' | sort -u)
          SERVICES=""
          for path in $CHANGED; do
            case "$path" in
              api)      SERVICES="$SERVICES api" ;;
              agent)    SERVICES="$SERVICES agent" ;;
              dashboard) SERVICES="$SERVICES dashboard" ;;
            esac
          done
          if echo "$CHANGED" | grep -q "^monitoring"; then
            SERVICES="$SERVICES prometheus grafana"
          fi
          [ -z "$SERVICES" ] && SERVICES="api"  # default if first deploy
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "Changed: $CHANGED"
          echo "Building: $SERVICES"

      - name: Build changed services
        run: |
          for svc in ${{ steps.detect.outputs.services }}; do
            echo "Building $svc..."
            docker compose build "$svc"
          done

      - name: Apply — docker compose up -d
        run: docker compose up -d ${{ steps.detect.outputs.services }}

      - name: Wait for /health/ready
        run: |
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 2 http://127.0.0.1:8000/health/ready || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "API ready after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "TIMEOUT: API never became ready"
          exit 1

      - name: Smoke E2E
        run: python3 $PROD_DIR/scripts/smoke_e2e.py

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deploy $(git rev-parse --short HEAD) succeeded: $(git log -1 --pretty=%s)"

      - name: Notify on failure
        if: failure()
        run: |
          SHORT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          echo "❌ Deploy $SHORT FAILED"
          echo "Check: tail -50 $PROD_DIR/deploy.log"
          echo "And:   docker compose ps"

# LiveKit SIP Server configuration
# NOTE: despite docker-compose also passing LIVEKIT_API_KEY/LIVEKIT_API_SECRET as
# env vars, this image version reads api_key/api_secret directly from this YAML
# file (env vars are NOT honored in practice — confirmed via "invalid API key:
# your-livekit-api-key" auth errors when these were left as placeholders).
# Must match the `keys:` entry in livekit.yaml and LIVEKIT_API_KEY/SECRET in .env.
api_key: devkey
api_secret: secret
ws_url: ws://localhost:7880

redis:
  address: 127.0.0.1:6379

# SIP signaling port. Internally on 5070 — iptables NAT redirects external
# 5060 to this port with per-source-IP rate limiting so the livekit-sip
# server's broken flood detection never trips on legitimate Twilio calls.
sip_port: 5070

# RTP media port range (must be open to internet — UDP)
# Protected by iptables SIP_ALLOWLIST chain: only Twilio IPs allowed.
rtp_port: 10000-20000

# Use the server's external/public IP for RTP
use_external_ip: true

logging:
  level: debug
